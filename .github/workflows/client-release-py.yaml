name: Python Client Release

on:
  push:
    tags:
      - 'sdk-py/v*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: src/client/acontext-py
    env:
      UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a
        with:
          version: "latest"

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/sdk-py/v}
          echo "version=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build distribution
        run: uv build

      - name: Publish to PyPI
        run: uv publish

      - name: Generate Changelog
        run: |
          bash .github/scripts/generate-changelog.sh \
            --tag-prefix "sdk-py/v" \
            --source-dir "src/client/acontext-py" \
            --display-name "Python SDK" \
            --output "${{ github.workspace }}-CHANGELOG.txt" \
            --footer "Published to https://pypi.org/project/acontext/${{ steps.version.outputs.version }}/"

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          body_path: ${{ github.workspace }}-CHANGELOG.txt
